# secretscan configuration
# See README.md for full documentation

# Maximum file size to scan (in bytes). Default: 10MB
max_file_size: 10485760

# Number of concurrent scanning workers
max_workers: 8

# Output format: text, json, sarif
output_format: text

# Scan mode: filesystem, git, all
scan_mode: filesystem

# Entropy threshold for high-entropy string detection (0-8 scale)
entropy_threshold: 4.0

# Also scan git history
include_git_history: false

# Path to ignore file
ignore_file: .secretignore

# Enable verbose output
verbose: false

# Paths to exclude from scanning
exclude_paths:
  - .git
  - node_modules
  - dist
  - build
  - vendor
  - __pycache__
  - .venv
  - .tox

# File extensions to include (empty = all text files)
